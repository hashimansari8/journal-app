{% extends "base.html" %}

{% block title %}New Note — NoteFlow{% endblock %}

{% block content %}
<div class="page-header">
    <h1>New Note</h1>
    <p class="subtitle">Capture a thought, idea, or reminder — your note is saved instantly.</p>
</div>

<div class="panel">
    <form method="POST" class="form">
        <label for="entry">Note content</label>
        <textarea id="entry" name="entry" rows="10" placeholder="What's on your mind?" required></textarea>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save note</button>
            <a href="{{ url_for('view_entries') }}" class="btn btn-ghost">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
